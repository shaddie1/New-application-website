services:
  - type: web
    name: onyxhawk-api
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm turbo run build --filter=@onyxhawk/api...
    startCommand: pnpm --filter @onyxhawk/api start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: AT_USERNAME
        sync: false
      - key: AT_API_KEY
        sync: false
      # Set only after Africa's Talking approves the alphanumeric sender ID
      # (e.g. ONYXHAWK). Unset → messages use AT's shared default sender.
      - key: SMS_SENDER_ID
        sync: false
      - key: MPESA_BASE_URL
        value: https://sandbox.safaricom.co.ke
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false

  # The admin app is a Next.js static export (see apps/admin/next.config.mjs):
  # `next build` emits plain HTML/JS into out/, so there is no server to start —
  # we serve those files. `next start` would fail here.
  - type: web
    name: onyxhawk-admin
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm turbo run build --filter=@onyxhawk/admin...
    startCommand: pnpm --filter @onyxhawk/admin start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
