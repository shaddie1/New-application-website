[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @onyxhawk/types build && pnpm --filter @onyxhawk/api build"

[deploy]
startCommand = "pnpm --filter @onyxhawk/api start:prod"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
